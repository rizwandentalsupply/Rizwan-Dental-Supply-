<body class="bg-[#0f172a] text-gray-200 p-4 pb-20">

    <div class="text-center mt-10 mb-12">
        <h1 class="text-4xl font-black text-white italic tracking-tighter leading-none">
            RIZWAN <span class="text-blue-500 italic font-black">DENTAL</span><br>
            <span class="text-xs font-bold tracking-[0.5em] text-gray-500 uppercase">Supply & Co.</span>
        </h1>
    </div>

    <div class="max-w-md mx-auto mb-12">

            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-500 transition-colors"></i>
            <input type="text" id="mainSearch" onkeyup="globalSearch()" 
                   placeholder="Search 300+ items (e.g. Mirror, Forceps...)" 
                   class="w-full bg-[#1e293b] border-2 border-gray-800 text-white rounded-[2.5rem] py-5 pl-14 pr-6 focus:outline-none focus:border-blue-500 shadow-2xl transition-all font-medium placeholder:text-gray-600">
        </div>

        <div id="searchResults" class="mt-6 space-y-4"></div>
    </div>

    <div id="homeCategories" class="max-w-md mx-auto grid grid-cols-1 gap-4">
        <h2 class="text-gray-500 font-black uppercase text-[10px] tracking-widest ml-4 mb-2">Shop by Category</h2>
        
        <a href="instruments.html" class="bg-[#1e293b] border border-gray-800 p-6 rounded-[2rem] flex items-center justify-between group">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-screwdriver-wrench text-blue-500 text-2xl"></i>
                <span class="text-white font-bold text-lg italic uppercase">Instruments</span>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-600 group-hover:translate-x-2 transition-transform"></i>
        </a>

        <a href="material.html" class="bg-[#1e293b] border border-gray-800 p-6 rounded-[2rem] flex items-center justify-between group">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-box-open text-blue-500 text-2xl"></i>
                <span class="text-white font-bold text-lg italic uppercase">Materials</span>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-600 group-hover:translate-x-2 transition-transform"></i>
        </a>

        <a href="equipment.html" class="bg-[#1e293b] border border-gray-800 p-6 rounded-[2rem] flex items-center justify-between group">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-chair text-blue-500 text-2xl"></i>
                <span class="text-white font-bold text-lg italic uppercase">Equipment</span>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-600 group-hover:translate-x-2 transition-transform"></i>
        </a>
    </div>

    <p class="text-center text-gray-600 text-[10px] mt-10 uppercase tracking-[0.3em]">Quality First • Rizwan Dental Supply</p>

    <script src="data.js"></script>
    <script>
        function globalSearch() {
            let input = document.getElementById('mainSearch').value.toLowerCase();
            let resultsDiv = document.getElementById('searchResults');
            let categories = document.getElementById('homeCategories');
            
            if (input.trim() === "") {
                resultsDiv.innerHTML = "";
                categories.style.display = "grid"; // Search khali ho to buttons dikhao
                return;
            }

            categories.style.display = "none"; // Search ho rahi ho to buttons chupa do
            resultsDiv.innerHTML = ""; 
            let count = 0;

            for (let id in productDetails) {
                let item = productDetails[id];
                if (item.name.toLowerCase().includes(input)) {
                    count++;
                    resultsDiv.innerHTML += `
                        <div class="bg-[#1e293b] p-4 rounded-[2rem] border border-gray-800 flex items-center gap-4 shadow-xl">
                            <img src="${id}.jpg" class="w-16 h-16 object-cover rounded-2xl bg-black" onerror="this.src='${id}.jpeg'; this.onerror=null;">
                            <div class="flex-1">
                                <h4 class="text-white font-bold text-sm uppercase italic">${item.name}</h4>
                                <p class="text-blue-500 font-black text-lg italic">Rs. ${item.price}</p>
                                <a href="https://wa.me/923096700704?text=I%20want%20to%20order:%20${item.name}" class="text-[9px] text-green-400 font-bold uppercase tracking-widest mt-1 inline-block">Order via WhatsApp</a>
                            </div>
                        </div>
                    `;
                }
            }

            if (count === 0) {
                resultsDiv.innerHTML = `<p class="text-center text-gray-600 italic py-10">Nothing found for "${input}"</p>`;
            }
        }
    </script>
</body>
</html>
