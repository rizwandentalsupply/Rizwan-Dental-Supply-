<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instruments | Rizwan Dental Supply</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-gray-200 p-4 pb-24">

    <nav class="mb-8"><a href="index.html" class="text-blue-500 font-bold"><i class="fa-solid fa-arrow-left"></i> BACK</a></nav>
    <h1 class="text-3xl font-black text-center text-white mb-10 uppercase italic">INSTRUMENTS LIST</h1>

    <div id="gallery" class="max-w-md mx-auto grid grid-cols-1 gap-8"></div>

    <script src="data.js"></script>

    <script>
        const gallery = document.getElementById('gallery');
        const totalItems = 80; 

        for (let i = 1; i <= totalItems; i++) {
            // Agar data.js mein info hai to wo uthao, warna default dikhao
            const info = (typeof productDetails !== 'undefined' && productDetails[`p${i}`]) 
                         ? productDetails[`p${i}`] 
                         : { name: `Dental Tool P${i}`, price: "Check Price", desc: "Best Quality" };

            const itemHtml = `
                <div class="bg-[#1e293b] p-5 rounded-[2.5rem] border border-gray-800 shadow-xl" id="box-${i}">
                    <img src="p${i}.jpg" class="w-full h-64 object-cover rounded-3xl bg-black mb-5" onerror="document.getElementById('box-${i}').style.display='none'">
                    <div class="px-3 text-center">
                        <h3 class="text-xl font-bold text-white uppercase italic">${info.name}</h3>
                        <p class="text-gray-400 text-xs mt-1">${info.desc}</p>
                        <p class="text-blue-500 text-2xl font-black mt-2 italic">Rs. ${info.price}</p>
                        <a href="https://wa.me/923096700704?text=I%20want%20to%20order%20${info.name}" class="mt-6 block bg-[#25D366] text-center py-4 rounded-2xl font-black uppercase text-sm shadow-xl">
                            <i class="fa-brands fa-whatsapp text-lg"></i> ORDER ON WHATSAPP
                        </a>
                    </div>
                </div>
            `;
            gallery.innerHTML += itemHtml;
        }
    </script>
</body>
</html>
